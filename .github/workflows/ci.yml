name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (Ubuntu / GCC)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov libfreetype6-dev

      # Caches the entire build dir so FetchContent deps (SDL2, SDL_ttf, GTest)
      # don't need to be re-downloaded/compiled on every push.
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-cmake-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build build --target wolfenstein_tests -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture \
            --directory build \
            --output-file coverage.info
          lcov --remove coverage.info \
            '/usr/*' \
            '*/build/_deps/*' \
            '*/tests/*' \
            --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
